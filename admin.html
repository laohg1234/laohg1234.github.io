<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#050b08">
    <meta name="keywords" content="FlavorStudio, 管理界面, FAlphaWeb">
    <meta name="description" content="FAlphaWeb 管理界面">
    <title>FAlphaWeb 管理界面</title>
    <link rel="icon" href="./flavor-mark.png">
    <link rel="stylesheet" href="./admin.css">
</head>
<body>
    <main id="password-container" class="auth-page">
        <section id="password-box" class="auth-card" aria-labelledby="auth-title">
            <a class="mini-brand" href="./" aria-label="返回主页"><span>F</span>FAlphaWeb CONTROL</a>
            <p class="eyebrow">Authorized access only</p>
            <h1 id="auth-title">进入管理界面</h1>
            <p class="auth-intro">请输入管理密码以继续。管理内容会在验证成功后于浏览器中解密。</p>
            <form id="password-form" novalidate>
                <label for="password-input">管理密码</label>
                <div class="input-row">
                    <input type="password" id="password-input" autocomplete="current-password" placeholder="输入密码" required>
                    <button class="toggle-password" id="toggle-password" type="button" aria-label="显示密码">显示</button>
                </div>
                <p id="password-error" class="form-error" role="alert" aria-live="polite"></p>
                <button class="submit-button" id="submit-button" type="submit">验证并进入 <span aria-hidden="true">→</span></button>
            </form>
            <a class="back-link" href="./">← 返回个人主页</a>
        </section>
        <div class="auth-decoration" aria-hidden="true"><span>F</span><span>A</span><span>W</span></div>
    </main>

    <div id="content" class="dashboard" hidden tabindex="-1"></div>

    <script src="./admin-data.js"></script>
    <script src="./admin.js"></script>
</body>
</html>
